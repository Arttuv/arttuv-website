<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OG Card - Screenshot this at 1200×630</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Roboto+Condensed:wght@300;400;700&family=Roboto+Serif:opsz,wght@8..144,100..900&display=swap');

  @property --border-angle {
    syntax: "<angle>";
    initial-value: 0deg;
    inherits: false;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #fffbf8;
    font-family: 'Libre Baskerville', serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    position: relative;
    overflow: hidden;
    /* Animated rainbow border */
    border: 4px solid transparent;
    background:
      linear-gradient(#fffbf8, #fffbf8) padding-box,
      linear-gradient(
        var(--border-angle, 0deg),
        #E03A3E,
        #F5821F,
        #FDB827,
        #61BB46,
        #009DDC,
        #963D97,
        #E03A3E
      ) border-box;
    animation: rotateBorder 4s linear infinite;
  }

  @keyframes rotateBorder {
    to { --border-angle: 360deg; }
  }

  /* Left: Bauhaus vertical bar */
  .bauhaus-bar {
    width: 56px;
    flex-shrink: 0;
    background: linear-gradient(
      to bottom,
      #E03A3E 30%,
      #F5821F 30% 52%,
      #009DDC 52%
    );
  }

  /* Main content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 70px;
    gap: 16px;
  }

  /* Horizontal Bauhaus bar (like featured cards) */
  .bauhaus-top {
    height: 10px;
    width: 280px;
    border-radius: 2px;
    background: linear-gradient(
      to right,
      #E03A3E 25%,
      #F5821F 25% 50%,
      #009DDC 50%
    );
    margin-bottom: 8px;
  }

  .site-name {
    font-family: 'Roboto Serif', serif;
    font-size: 52px;
    font-weight: 700;
    color: #000;
    line-height: 1.15;
    letter-spacing: -0.5px;
  }

  .tagline {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: #666;
    line-height: 1.4;
    max-width: 520px;
  }

  .domain {
    font-family: 'SF Mono', 'Fira Mono', 'Roboto Mono', monospace;
    font-size: 20px;
    color: #999;
    letter-spacing: 0.05em;
    margin-top: 8px;
  }

  .tags {
    display: flex;
    gap: 14px;
    margin-top: 4px;
  }

  .tag {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 18px;
    font-weight: 500;
  }

  .tag-dev { color: #E03A3E; }
  .tag-hci { color: #009DDC; }
  .tag-research { color: #61BB46; }

  /* Right: Photo */
  .photo-area {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 40px 40px 0;
  }

  .photo-frame {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #eee;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Corner accent blocks */
  .accent-bottom {
    position: absolute;
    bottom: 0;
    right: 0;
    display: flex;
    gap: 0;
  }

  .accent-block {
    width: 80px;
    height: 8px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="bauhaus-bar"></div>
    <div class="content">
      <div class="bauhaus-top"></div>
      <div class="site-name">Arttu Viljakainen</div>
      <div class="tagline">Software development, teams,<br>and human–computer interaction</div>
      <div class="tags">
        <span class="tag tag-dev">#dev</span>
        <span class="tag tag-hci">#hci</span>
        <span class="tag tag-research">#research</span>
      </div>
      <div class="domain">arttuv.com</div>
    </div>
    <div class="photo-area">
      <div class="photo-frame">
        <img src="/images/arttuv-bw.jpeg" alt="Arttu Viljakainen" />
      </div>
    </div>
  </div>
</body>
</html>
