<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OG Card - Screenshot this at 1200×630</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Roboto+Condensed:wght@300;400;700&family=Roboto+Serif:opsz,wght@8..144,100..900&display=swap');

  @property --border-angle {
    syntax: "<angle>";
    initial-value: 0deg;
    inherits: false;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #fffbf8;
    font-family: 'Libre Baskerville', serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    position: relative;
    overflow: hidden;
    /* Animated rainbow border */
    border: 4px solid transparent;
    background:
      linear-gradient(#fffbf8, #fffbf8) padding-box,
      linear-gradient(
        var(--border-angle, 0deg),
        #E03A3E,
        #F5821F,
        #FDB827,
        #61BB46,
        #009DDC,
        #963D97,
        #E03A3E
      ) border-box;
    animation: rotateBorder 4s linear infinite;
  }

  @keyframes rotateBorder {
    to { --border-angle: 360deg; }
  }

  /* Left: Bauhaus vertical bar */
  .bauhaus-bar {
    width: 56px;
    flex-shrink: 0;
    background: linear-gradient(
      to bottom,
      #E03A3E 30%,
      #F5821F 30% 52%,
      #009DDC 52%
    );
  }

  /* Main content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 70px;
    gap: 14px;
  }

  /* Horizontal Bauhaus bar (like featured cards) */
  .bauhaus-top {
    height: 10px;
    width: 280px;
    border-radius: 2px;
    background: linear-gradient(
      to right,
      #E03A3E 25%,
      #F5821F 25% 50%,
      #009DDC 50%
    );
    margin-bottom: 8px;
  }

  .eyebrow {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #666;
  }

  .site-name {
    font-family: 'Roboto Serif', serif;
    font-size: 62px;
    font-weight: 700;
    color: #000;
    line-height: 1.15;
    letter-spacing: -0.5px;
  }

  .tagline {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 25px;
    font-weight: 400;
    color: #666;
    line-height: 1.4;
    max-width: 620px;
  }

  .blurb {
    font-family: 'Roboto Serif', serif;
    font-size: 20px;
    line-height: 1.55;
    color: #2d2d2d;
    max-width: 620px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 10px;
  }

  .tag {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 18px;
    font-weight: 500;
  }

  .tag-dev { color: #E03A3E; }
  .tag-hci { color: #009DDC; }
  .tag-research { color: #61BB46; }

  .signal-area {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 40px 40px 0;
  }

  .signal-panel {
    width: 240px;
    min-height: 280px;
    border: 1px solid rgba(0,0,0,0.14);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.92), rgba(248,244,240,0.96)),
      linear-gradient(135deg, rgba(224,58,62,0.08), rgba(0,157,220,0.08));
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 22px;
    position: relative;
  }

  .signal-panel::before,
  .signal-panel::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    border-style: solid;
    border-color: #222;
    opacity: 0.5;
  }

  .signal-panel::before {
    top: 10px;
    left: 10px;
    border-width: 2px 0 0 2px;
  }

  .signal-panel::after {
    right: 10px;
    bottom: 10px;
    border-width: 0 2px 2px 0;
  }

  .signal-grid {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .signal-cell {
    aspect-ratio: 1;
  }

  .signal-cell:nth-child(1) { background: #E03A3E; }
  .signal-cell:nth-child(2) { background: #F5821F; }
  .signal-cell:nth-child(3) { background: #FDB827; }
  .signal-cell:nth-child(4) { background: #fffbf8; border: 1px solid rgba(0,0,0,0.12); }
  .signal-cell:nth-child(5) { background: #61BB46; }
  .signal-cell:nth-child(6) { background: #fffbf8; border: 1px solid rgba(0,0,0,0.12); }
  .signal-cell:nth-child(7) { background: #009DDC; }
  .signal-cell:nth-child(8) { background: #fffbf8; border: 1px solid rgba(0,0,0,0.12); }
  .signal-cell:nth-child(9) { background: #963D97; }

  .signal-copy {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 17px;
    line-height: 1.5;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Corner accent blocks */
  .accent-bottom {
    position: absolute;
    bottom: 0;
    right: 0;
    display: flex;
    gap: 0;
  }

  .accent-block {
    width: 80px;
    height: 8px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="bauhaus-bar"></div>
    <div class="content">
      <div class="bauhaus-top"></div>
      <div class="eyebrow">Essays and notes</div>
      <div class="site-name">arttuv.com</div>
      <div class="tagline">Software development, AI, teams, and human-computer interaction.</div>
      <div class="blurb">Writing about automation, software practice, collaboration, and how people work with complex systems.</div>
      <div class="tags">
        <span class="tag tag-dev">#dev</span>
        <span class="tag tag-hci">#hci</span>
        <span class="tag tag-research">#research</span>
      </div>
    </div>
    <div class="signal-area">
      <div class="signal-panel">
        <div class="signal-grid" aria-hidden="true">
          <div class="signal-cell"></div>
          <div class="signal-cell"></div>
          <div class="signal-cell"></div>
          <div class="signal-cell"></div>
          <div class="signal-cell"></div>
          <div class="signal-cell"></div>
          <div class="signal-cell"></div>
          <div class="signal-cell"></div>
          <div class="signal-cell"></div>
        </div>
        <div class="signal-copy">Human-centered software and systems thinking.</div>
      </div>
    </div>
  </div>
</body>
</html>
